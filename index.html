<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ciné-Notes — Cherchez un film et notez-le</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #171a23;
    --card: #1d212c;
    --border: #2b303d;
    --txt: #e8eaf0;
    --muted: #9aa1b0;
    --accent: #ffb400;
    --accent2: #fd5e53;
    --ok: #38c172;
    --err: #ff5c6c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #1c2030 0%, var(--bg) 60%);
    color: var(--txt);
    min-height: 100vh;
  }
  a { color: var(--accent); }

  .hero {
    text-align: center;
    padding: 40px 20px 28px;
    background: linear-gradient(180deg, rgba(253,94,83,.10), transparent);
    border-bottom: 1px solid var(--border);
  }
  .hero h1 { margin: 0 0 6px; font-size: 2.2rem; letter-spacing: .5px; }
  .hero p { margin: 0 auto 18px; color: var(--muted); max-width: 620px; }

  .search-form { display: flex; gap: 10px; max-width: 720px; margin: 0 auto; flex-wrap: wrap; }
  .search-form input[type=text] {
    flex: 1 1 320px; min-width: 0;
    padding: 13px 16px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--bg2); color: var(--txt); font-size: 1rem;
  }
  .search-form input[type=text]:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .btn {
    padding: 13px 22px; border: none; border-radius: 10px; cursor: pointer;
    font-size: 1rem; font-weight: 600; color: #1a1205;
    background: linear-gradient(180deg, #ffc63d, var(--accent));
    transition: transform .08s ease, filter .15s ease;
  }
  .btn:hover { filter: brightness(1.05); }
  .btn:active { transform: translateY(1px); }
  .btn[disabled] { opacity: .6; cursor: progress; }
  .btn.small { padding: 8px 14px; font-size: .9rem; }

  .msg { min-height: 20px; margin: 12px auto 0; font-size: .92rem; }
  .msg.err { color: var(--err); }
  .msg.ok  { color: var(--ok); }
  .msg.info{ color: var(--muted); }

  main { max-width: 1000px; margin: 0 auto; padding: 26px 18px 80px; }
  .section-title {
    font-size: 1.2rem; color: var(--muted); font-weight: 600;
    border-bottom: 1px solid var(--border); padding-bottom: 10px; margin: 30px 0 22px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title .count { color: var(--accent); }
  .empty { text-align: center; color: var(--muted); padding: 30px 0; }

  /* Grille de résultats de recherche */
  .results-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px;
  }
  .result {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; display: flex; flex-direction: column;
  }
  .result .poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #0c0e14; display:block; }
  .result .poster.no-img { display: grid; place-items: center; color: var(--muted); font-size: .8rem; text-align:center; padding: 8px; }
  .result .info { padding: 10px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .result .r-title { font-weight: 600; font-size: .95rem; line-height: 1.25; }
  .result .r-year { color: var(--muted); font-size: .82rem; }
  .result .add-btn { margin-top: auto; }
  .result .add-btn[disabled] { background: #2b303d; color: var(--muted); cursor: default; opacity:1; }

  /* Fiche d'un film noté */
  .movie-card {
    position: relative;
    display: grid; grid-template-columns: 150px 1fr; gap: 20px;
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px; margin-bottom: 22px; box-shadow: 0 8px 24px rgba(0,0,0,.25);
  }
  @media (max-width: 560px) { .movie-card { grid-template-columns: 1fr; } }
  .poster-wrap { width: 100%; }
  .movie-card .poster {
    width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 10px;
    background: #0c0e14; display: block;
  }
  .movie-card .poster.no-img { display: grid; place-items: center; color: var(--muted); font-size: .8rem; text-align:center; }
  .movie-title { margin: 0 0 4px; font-size: 1.4rem; }
  .movie-meta { margin: 0 0 10px; color: var(--muted); font-size: .9rem; }
  .movie-synopsis { margin: 0 0 14px; line-height: 1.5; color: #c7ccd8; font-size: .95rem; }
  .delete-btn {
    position: absolute; top: 10px; right: 12px;
    background: transparent; border: none; color: var(--muted); font-size: 1.1rem; cursor: pointer; line-height: 1;
  }
  .delete-btn:hover { color: var(--err); }

  .avg-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .avg-text { color: var(--muted); font-size: .9rem; }
  .avg-text b { color: var(--accent); font-size: 1.05rem; }

  /* Étoiles d'affichage (lecture seule) */
  .stars-display { --pct: 0%; position: relative; display: inline-block; font-size: 1.4rem; line-height: 1; letter-spacing: 2px; }
  .stars-display::before { content: "★★★★★"; color: #3a3f4d; }
  .stars-display::after {
    content: "★★★★★"; color: var(--accent); position: absolute; left: 0; top: 0;
    width: var(--pct); overflow: hidden; white-space: nowrap;
  }

  details.review-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 4px 14px; margin-bottom: 14px; }
  details.review-box summary { cursor: pointer; padding: 8px 0; font-weight: 600; }
  .review-form { display: flex; flex-direction: column; gap: 12px; padding: 8px 0 14px; }
  .field { display: flex; flex-direction: column; gap: 5px; font-size: .85rem; color: var(--muted); }
  .field input[type=text], .field textarea {
    padding: 9px 12px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--card); color: var(--txt); font-size: .95rem; font-family: inherit;
  }
  .field textarea { resize: vertical; }
  .review-msg { font-size: .85rem; }
  .review-msg.err { color: var(--err); }

  /* Saisie interactive des étoiles (demi-étoiles) */
  .star-input { display: inline-flex; font-size: 1.9rem; cursor: pointer; user-select: none; }
  .star-input .star { position: relative; width: 1em; }
  .star-input .star span { position: absolute; left: 0; top: 0; }
  .star-input .star .bg   { color: #3a3f4d; }
  .star-input .star .half { color: var(--accent); width: 50%; overflow: hidden; }
  .star-input .star .full { color: var(--accent); }
  .rating-hint { font-size: .85rem; color: var(--muted); margin-left: 10px; align-self: center; }

  .reviews { display: flex; flex-direction: column; gap: 12px; }
  .review { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
  .review-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .review-head .who { font-weight: 600; }
  .review-head .when { color: var(--muted); font-size: .8rem; }
  .review-head .stars-display { font-size: 1rem; }
  .review-text { margin: 0; line-height: 1.45; color: #c7ccd8; font-size: .92rem; white-space: pre-wrap; }
  .no-reviews { color: var(--muted); font-size: .88rem; font-style: italic; }
</style>
</head>
<body>
  <header class="hero">
    <h1>🎬 Ciné-Notes</h1>
    <p>Tapez le nom d'un film, choisissez-le parmi les affiches, puis notez-le de 0 à 5 étoiles avec un avis.</p>
    <form id="search-form" class="search-form">
      <input type="text" id="search-input" placeholder="Ex : Inception, Le Parrain, Intouchables…" autocomplete="off" required />
      <button type="submit" class="btn" id="search-btn">Rechercher</button>
    </form>
    <p id="search-msg" class="msg" role="status"></p>
  </header>

  <main>
    <section id="results-section" style="display:none">
      <h2 class="section-title">Résultats de la recherche</h2>
      <div id="results" class="results-grid"></div>
    </section>

    <h2 class="section-title">Mes films notés <span class="count" id="my-count"></span></h2>
    <div id="movies"></div>
    <p id="empty" class="empty">Aucun film noté pour l'instant. Cherchez un film ci-dessus pour commencer !</p>
  </main>

<script>
/* =========================================================================
   CONFIG — API TMDB (The Movie Database) : gratuite, sans proxy, CORS OK.
   La clé ci-dessous est une clé de test publique. Pour la vôtre (gratuite) :
   https://www.themoviedb.org/settings/api  → remplacez TMDB_KEY.
   ========================================================================= */
const TMDB_KEY = "8265bd1679663a7ea12ac168da84d2e8";
const TMDB_SEARCH = "https://api.themoviedb.org/3/search/movie";
const TMDB_IMG = "https://image.tmdb.org/t/p/w500";

/* =========================================================================
   STOCKAGE LOCAL (localStorage)
   ========================================================================= */
const STORAGE_KEY = "cine-notes-v2";
function loadMovies() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } }
function saveMovies(list) { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }
let movies = loadMovies();
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

/* =========================================================================
   RECHERCHE TMDB
   ========================================================================= */
const searchForm = document.getElementById("search-form");
const searchInput = document.getElementById("search-input");
const searchBtn = document.getElementById("search-btn");
const searchMsg = document.getElementById("search-msg");
const resultsSection = document.getElementById("results-section");
const resultsEl = document.getElementById("results");

function setSearchMsg(t, cls) { searchMsg.textContent = t; searchMsg.className = "msg " + (cls || ""); }

searchForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  const q = searchInput.value.trim();
  if (!q) return;
  searchBtn.disabled = true;
  setSearchMsg("Recherche en cours…", "info");
  try {
    const url = `${TMDB_SEARCH}?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}&language=fr-FR&include_adult=false`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error("Le service de recherche a répondu " + resp.status);
    const data = await resp.json();
    const list = (data.results || []).filter(m => m.title);
    renderResults(list);
    setSearchMsg(list.length ? `${list.length} film(s) trouvé(s) pour « ${q} »` : `Aucun film trouvé pour « ${q} ».`,
                 list.length ? "ok" : "err");
  } catch (err) {
    setSearchMsg("Échec de la recherche : " + err.message, "err");
  } finally {
    searchBtn.disabled = false;
  }
});

function renderResults(list) {
  resultsSection.style.display = list.length ? "block" : "none";
  resultsEl.innerHTML = "";
  for (const r of list) {
    const year = (r.release_date || "").slice(0, 4);
    const poster = r.poster_path ? TMDB_IMG + r.poster_path : null;
    const already = movies.some(m => m.tmdbId === r.id);

    const el = document.createElement("div");
    el.className = "result";
    el.innerHTML = `
      ${poster
        ? `<img class="poster" src="${poster}" alt="Affiche de ${escapeHtml(r.title)}" loading="lazy"
              onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'poster no-img',textContent:'Pas d\\'affiche'}))" />`
        : `<div class="poster no-img">Pas d'affiche</div>`}
      <div class="info">
        <div class="r-title">${escapeHtml(r.title)}</div>
        <div class="r-year">${year || "Année inconnue"}</div>
        <button class="btn small add-btn" ${already ? "disabled" : ""}>${already ? "✓ Déjà ajouté" : "+ Ajouter"}</button>
      </div>`;

    el.querySelector(".add-btn").addEventListener("click", (ev) => {
      if (movies.some(m => m.tmdbId === r.id)) return;
      addMovie({
        tmdbId: r.id,
        title: r.title,
        year: year || null,
        poster,
        synopsis: r.overview || null,
        tmdbRating: (r.vote_average != null && r.vote_average > 0) ? Math.round(r.vote_average / 2 * 10) / 10 : null,
      });
      ev.target.disabled = true;
      ev.target.textContent = "✓ Déjà ajouté";
      setSearchMsg(`« ${r.title} » ajouté à vos films notés ✔`, "ok");
    });

    resultsEl.appendChild(el);
  }
}

function addMovie(data) {
  movies.unshift({
    id: uid(),
    tmdbId: data.tmdbId || null,
    title: data.title,
    year: data.year || null,
    poster: data.poster || null,
    synopsis: data.synopsis || null,
    tmdbRating: data.tmdbRating ?? null,
    addedAt: new Date().toISOString(),
    reviews: [],
  });
  saveMovies(movies);
  render();
}

/* =========================================================================
   RENDU DES FILMS NOTÉS
   ========================================================================= */
const moviesEl = document.getElementById("movies");
const emptyEl = document.getElementById("empty");
const myCount = document.getElementById("my-count");

function avgOf(movie) {
  if (!movie.reviews.length) return null;
  return movie.reviews.reduce((s, r) => s + r.rating, 0) / movie.reviews.length;
}
function starsDisplay(value) {
  const pct = Math.max(0, Math.min(100, (value / 5) * 100));
  return `<span class="stars-display" style="--pct:${pct}%"></span>`;
}
function fmtDate(iso) {
  try { return new Date(iso).toLocaleDateString("fr-FR", { day: "2-digit", month: "short", year: "numeric" }); }
  catch { return ""; }
}
function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

function render() {
  moviesEl.innerHTML = "";
  emptyEl.style.display = movies.length ? "none" : "block";
  myCount.textContent = movies.length ? `(${movies.length})` : "";

  for (const movie of movies) {
    const avg = avgOf(movie);
    const card = document.createElement("article");
    card.className = "movie-card";

    const metaParts = [];
    if (movie.year) metaParts.push(movie.year);
    if (movie.tmdbRating != null) metaParts.push("Note du public : " + movie.tmdbRating + "/5");

    const posterHtml = movie.poster
      ? `<img class="poster" src="${escapeHtml(movie.poster)}" alt="Affiche de ${escapeHtml(movie.title)}"
            onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'poster no-img',textContent:'Pas d\\'affiche'}))" />`
      : `<div class="poster no-img">Pas d'affiche</div>`;

    card.innerHTML = `
      <button class="delete-btn" title="Retirer ce film">✕</button>
      <div class="poster-wrap">${posterHtml}</div>
      <div class="movie-body">
        <h3 class="movie-title">${escapeHtml(movie.title)}</h3>
        <p class="movie-meta">${escapeHtml(metaParts.join(" · "))}</p>
        ${movie.synopsis ? `<p class="movie-synopsis">${escapeHtml(movie.synopsis)}</p>` : ""}

        <div class="avg-row">
          ${starsDisplay(avg || 0)}
          <span class="avg-text">${avg != null
            ? `<b>${avg.toFixed(1)}</b> / 5 — ${movie.reviews.length} avis`
            : "Pas encore noté"}</span>
        </div>

        <details class="review-box">
          <summary>✍️ Donner mon avis</summary>
          <form class="review-form">
            <label class="field"><span>Votre nom</span>
              <input type="text" class="author" placeholder="Anonyme" maxlength="60" /></label>
            <label class="field"><span>Votre note (cliquez sur les étoiles)</span>
              <span style="display:flex;align-items:center;flex-wrap:wrap">
                <span class="star-input" data-rating="0"></span>
                <span class="rating-hint">0 / 5</span>
              </span></label>
            <label class="field"><span>Votre avis</span>
              <textarea class="comment" rows="3" maxlength="2000" placeholder="Qu'avez-vous pensé du film ?"></textarea></label>
            <button type="submit" class="btn submit-review">Publier mon avis</button>
            <span class="review-msg"></span>
          </form>
        </details>

        <div class="reviews">
          ${movie.reviews.length
            ? movie.reviews.map(r => `
              <div class="review">
                <div class="review-head">
                  <span class="who">${escapeHtml(r.author)}</span>
                  ${starsDisplay(r.rating)}
                  <span class="when">${fmtDate(r.date)}</span>
                </div>
                ${r.comment ? `<p class="review-text">${escapeHtml(r.comment)}</p>` : ""}
              </div>`).join("")
            : `<p class="no-reviews">Soyez le premier à donner votre avis.</p>`}
        </div>
      </div>`;

    card.querySelector(".delete-btn").addEventListener("click", () => {
      if (confirm("Retirer « " + movie.title + " » et tous ses avis ?")) {
        movies = movies.filter(m => m.id !== movie.id);
        saveMovies(movies);
        render();
        // réactive le bouton "Ajouter" dans les résultats si présent
        if (searchInput.value.trim()) searchForm.requestSubmit?.();
      }
    });

    const starInput = card.querySelector(".star-input");
    const hint = card.querySelector(".rating-hint");
    buildStarInput(starInput, hint);

    card.querySelector(".review-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const rating = Number(starInput.dataset.rating);
      const msgEl = card.querySelector(".review-msg");
      if (!(rating > 0)) {
        msgEl.textContent = "Choisissez une note en cliquant sur les étoiles.";
        msgEl.className = "review-msg err";
        return;
      }
      const author = card.querySelector(".author").value.trim() || "Anonyme";
      const comment = card.querySelector(".comment").value.trim();
      movie.reviews.unshift({ id: uid(), rating, author, comment, date: new Date().toISOString() });
      saveMovies(movies);
      render();
    });

    moviesEl.appendChild(card);
  }
}

/* Sélecteur d'étoiles cliquable avec demi-étoiles */
function buildStarInput(container, hint) {
  container.innerHTML = "";
  const stars = [];
  for (let i = 0; i < 5; i++) {
    const star = document.createElement("span");
    star.className = "star";
    star.innerHTML = `<span class="bg">★</span><span class="full">★</span><span class="half">★</span>`;
    container.appendChild(star);
    stars.push(star);

    star.addEventListener("mousemove", (e) => {
      const rect = star.getBoundingClientRect();
      paint(i + ((e.clientX - rect.left) < rect.width / 2 ? 0.5 : 1));
    });
    star.addEventListener("click", (e) => {
      const rect = star.getBoundingClientRect();
      const val = i + ((e.clientX - rect.left) < rect.width / 2 ? 0.5 : 1);
      container.dataset.rating = String(val);
      paint(val);
    });
  }
  container.addEventListener("mouseleave", () => paint(Number(container.dataset.rating)));

  function paint(value) {
    stars.forEach((star, idx) => {
      const filled = value - idx; // >=1 plein, .5 demi, sinon vide
      star.querySelector(".full").style.opacity = filled >= 1 ? "1" : "0";
      star.querySelector(".half").style.opacity = (filled >= 0.5 && filled < 1) ? "1" : "0";
    });
    if (hint) hint.textContent = (value || 0) + " / 5";
  }
  paint(Number(container.dataset.rating) || 0);
}

render();
</script>
</body>
</html>
